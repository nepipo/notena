name: CI

on:
  push:
    branches: [main]
  pull_request:

# Laufende Checks abbrechen, wenn neuer Commit auf denselben Branch/PR kommt.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (inkl. Test-Dateien)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test
